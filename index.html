<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A browser-based flashcard study application">
    <title>Flashcards Study App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1 class="app-title">📚 Flashcards</h1>
            <button class="btn btn-primary" id="newDeckBtn" aria-label="Create a new deck">
                + New Deck
            </button>
        </header>

        <!-- Main Layout: Sidebar + Content -->
        <div class="app-body">
            <!-- Sidebar: Deck List -->
            <aside class="sidebar">
                <h2 class="sidebar-title">Decks</h2>
                <nav class="deck-list" id="deckList" aria-label="Decks navigation">
                    <!-- Deck items inserted here -->
                </nav>
                <div class="empty-state" id="emptyDecks" style="display: none;">
                    <p>No decks yet. Create one to get started!</p>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <!-- Empty State -->
                <section class="empty-state-container" id="emptyState">
                    <div class="empty-state">
                        <p>👋 Select a deck to begin studying</p>
                    </div>
                </section>

                <!-- Deck View -->
                <section class="deck-view" id="deckView" style="display: none;">
                    <!-- Deck Header -->
                    <div class="deck-header">
                        <h2 id="deckTitle">Deck Name</h2>
                        <div class="deck-actions">
                            <button class="btn btn-small" id="editDeckBtn" aria-label="Edit deck">Edit</button>
                            <button class="btn btn-small btn-danger" id="deleteDeckBtn" aria-label="Delete deck">Delete</button>
                        </div>
                    </div>

                    <!-- Deck Toolbar -->
                    <div class="deck-toolbar">
                        <div class="search-box">
                            <input 
                                type="search" 
                                id="searchInput" 
                                placeholder="Search cards..." 
                                aria-label="Search cards in deck"
                            >
                        </div>
                        <button class="btn btn-secondary" id="shuffleBtn" aria-label="Shuffle cards">
                            🔀 Shuffle
                        </button>
                        <button class="btn btn-primary" id="newCardBtn" aria-label="Add a new card">
                            + New Card
                        </button>
                    </div>

                    <!-- Card Stats -->
                    <div class="card-stats">
                        <span id="cardCount">0 cards</span>
                        <span id="filterCount" style="display: none;">(<span id="filterCountNum">0</span> shown)</span>
                    </div>

                    <!-- Study Area -->
                    <div class="study-area">
                        <!-- Card Display -->
                        <div class="card-container" id="cardContainer">
                            <div class="flashcard" id="flashcard">
                                <div class="flashcard-inner">
                                    <div class="flashcard-front">
                                        <p id="cardFront">Select a card to begin</p>
                                    </div>
                                    <div class="flashcard-back">
                                        <p id="cardBack">Card back</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Card Controls -->
                        <div class="card-controls">
                            <button class="btn btn-secondary" id="prevBtn" aria-label="Previous card">← Previous</button>
                            <button class="btn btn-secondary" id="flipBtn" aria-label="Flip card">🔄 Flip</button>
                            <button class="btn btn-secondary" id="nextBtn" aria-label="Next card">Next →</button>
                        </div>

                        <!-- Card Navigation -->
                        <div class="card-nav">
                            <input 
                                type="number" 
                                id="cardIndex" 
                                min="1" 
                                value="1"
                                aria-label="Current card number"
                            >
                            <span id="cardNav">/ 0</span>
                        </div>

                        <!-- Card Actions (Edit/Delete) -->
                        <div class="card-actions">
                            <button class="btn btn-small" id="editCardBtn" aria-label="Edit current card">Edit</button>
                            <button class="btn btn-small btn-danger" id="deleteCardBtn" aria-label="Delete current card">Delete</button>
                        </div>
                    </div>

                    <!-- Cards List View (Optional) -->
                    <div class="cards-list" id="cardsList">
                        <!-- Card items inserted here -->
                    </div>
                </section>
            </main>
        </div>

        <!-- Footer -->
        <footer class="app-footer">
            <p>💡 Press <kbd>Space</kbd> to flip, <kbd>←</kbd><kbd>→</kbd> to navigate, or <kbd>Esc</kbd> to close modals.</p>
        </footer>
    </div>

    <!-- Modals -->

    <!-- New/Edit Deck Modal -->
    <div class="modal" id="deckModal" role="dialog" aria-labelledby="deckModalTitle" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="deckModalTitle">New Deck</h2>
                <button class="modal-close" id="closeDeckModal" aria-label="Close modal">✕</button>
            </div>
            <form id="deckForm" class="modal-form">
                <div class="form-group">
                    <label for="deckNameInput">Deck Name</label>
                    <input 
                        type="text" 
                        id="deckNameInput" 
                        placeholder="e.g., Spanish Vocab"
                        required
                        aria-required="true"
                    >
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Deck</button>
                    <button type="button" class="btn btn-secondary" id="cancelDeckBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- New/Edit Card Modal -->
    <div class="modal" id="cardModal" role="dialog" aria-labelledby="cardModalTitle" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="cardModalTitle">New Card</h2>
                <button class="modal-close" id="closeCardModal" aria-label="Close modal">✕</button>
            </div>
            <form id="cardForm" class="modal-form">
                <div class="form-group">
                    <label for="cardFrontInput">Front (Question)</label>
                    <textarea 
                        id="cardFrontInput" 
                        placeholder="What should the student learn?"
                        rows="4"
                        required
                        aria-required="true"
                    ></textarea>
                </div>
                <div class="form-group">
                    <label for="cardBackInput">Back (Answer)</label>
                    <textarea 
                        id="cardBackInput" 
                        placeholder="The answer or explanation"
                        rows="4"
                        required
                        aria-required="true"
                    ></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Card</button>
                    <button type="button" class="btn btn-secondary" id="cancelCardBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirmModal" role="dialog" aria-labelledby="confirmModalTitle" aria-hidden="true">
        <div class="modal-content modal-confirm">
            <div class="modal-header">
                <h2 id="confirmModalTitle">Confirm Action</h2>
            </div>
            <p id="confirmModalMessage">Are you sure?</p>
            <div class="form-actions">
                <button class="btn btn-danger" id="confirmYesBtn">Yes, Delete</button>
                <button class="btn btn-secondary" id="confirmNoBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
